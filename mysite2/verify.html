<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify Certificate | My Swim Zone</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color:#0a3d91;
  text-align:center;
}

.container {
  max-width:600px;
  margin:80px auto;
  padding:40px;
}

h1 {
  margin-bottom:10px;
}

input {
  padding:12px;
  width:70%;
  border:1px solid #ccc;
  border-radius:8px;
  margin-top:10px;
}

button {
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:#1e90ff;
  color:white;
  cursor:pointer;
  font-weight:bold;
  margin-top:15px;
}

button:hover {
  background:#0a3d91;
}

.result {
  margin-top:30px;
  font-size:18px;
  padding:20px;
  border-radius:10px;
  border:1px solid #eee;
}

.logo {
  width:80px;
  margin-bottom:15px;
}
</style>

</head>

<body>

<div class="container">

  <img src="assets/images/chatgpt20image20jan202020202620at2002-45-4520pm-2-144x144.png" class="logo">

  <h1>Verify Certificate</h1>
  <p>Enter your certificate ID</p>

  <input type="text" id="certID" placeholder="MSZ-001"><br>

  <button onclick="checkCert()">GET STARTED</button>

  <div class="result" id="result"></div>

</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
const idFromURL = urlParams.get('id');

if (idFromURL) {
  document.getElementById("certID").value = idFromURL;
  checkCert();
}
const data = {
  "MrZ-001": { name: "John", award: "1st Place" },
  "MrZ-002": { name: "Emma", award: "Best Effort" }
};

function checkCert() {
  let id = document.getElementById("certID").value;
  let result = document.getElementById("result");

  if (data[id]) {
    result.innerHTML = `
      🏆 <b>Certificate Verified</b><br><br>
      <b>Name:</b> ${data[id].name}<br>
      <b>Award:</b> ${data[id].award}<br><br>
      <span style="color:green;">✔ Official My Swim Zone Certificate</span>
    `;
  } else {
    result.innerHTML = `
      ❌ Certificate not found<br>
      <span style="font-size:14px;">Please check the ID</span>
    `;
  }
}
</script>

</body>
</html>
